name: Build CLI

on:
  push:
    branches:
      - main
      - prod
    paths:
      - "crates/cli/**"
      - "crates/common/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - ".github/workflows/build-cli.yml"

permissions:
  contents: read

jobs:
  build:
    name: ${{ matrix.artifact }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
            artifact: relay-linux-x86_64
            use-cross: true

          - os: ubuntu-latest
            target: aarch64-unknown-linux-musl
            artifact: relay-linux-aarch64
            use-cross: true

          - os: macos-latest
            target: aarch64-apple-darwin
            artifact: relay-macos-aarch64
            use-cross: false

          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: relay-windows-x86_64.exe
            use-cross: false

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross
        if: matrix.use-cross
        uses: taiki-e/install-action@v2
        with:
          tool: cross

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Build (cross)
        if: matrix.use-cross
        run: cross build --release --target ${{ matrix.target }} --bin relay_cli

      - name: Build (native)
        if: "!matrix.use-cross"
        run: cargo build --release --target ${{ matrix.target }} --bin relay_cli

      - name: Upload artifact (unix)
        if: matrix.os != 'windows-latest'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: target/${{ matrix.target }}/release/relay_cli
          if-no-files-found: error
          retention-days: 7

      - name: Upload artifact (windows)
        if: matrix.os == 'windows-latest'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: target/${{ matrix.target }}/release/relay_cli.exe
          if-no-files-found: error
          retention-days: 7
