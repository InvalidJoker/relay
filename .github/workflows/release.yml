name: Release CLI

on:
  push:
    branches:
      - prod
    paths:
      - "crates/cli/**"
      - "crates/common/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - ".github/workflows/release.yml"

permissions:
  contents: write
  packages: write

jobs:
  build:
    name: ${{ matrix.artifact }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
            artifact: relay-linux-x86_64
            use-cross: true

          - os: ubuntu-latest
            target: aarch64-unknown-linux-musl
            artifact: relay-linux-aarch64
            use-cross: true

          - os: macos-latest
            target: aarch64-apple-darwin
            artifact: relay-macos-aarch64
            use-cross: false

          - os: macos-latest
            target: x86_64-apple-darwin
            artifact: relay-macos-x86_64
            use-cross: false

          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: relay-windows-x86_64.exe
            use-cross: false

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross
        if: matrix.use-cross
        uses: taiki-e/install-action@v2
        with:
          tool: cross

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Build (cross)
        if: matrix.use-cross
        run: cross build --release --target ${{ matrix.target }} --bin relay_cli

      - name: Build (native)
        if: "!matrix.use-cross"
        run: cargo build --release --target ${{ matrix.target }} --bin relay_cli

      - name: Rename binary (unix)
        if: matrix.os != 'windows-latest'
        run: cp target/${{ matrix.target }}/release/relay_cli ${{ matrix.artifact }}

      - name: Rename binary (windows)
        if: matrix.os == 'windows-latest'
        run: cp target/${{ matrix.target }}/release/relay_cli.exe ${{ matrix.artifact }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}
          if-no-files-found: error
          retention-days: 1

  release:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate version tag
        id: version
        run: |
          DATE=$(date -u +%Y.%m.%d)
          SHA=$(git rev-parse --short HEAD)
          echo "tag=v${DATE}-${SHA}" >> $GITHUB_OUTPUT

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Flatten artifacts
        run: |
          mkdir release-assets
          find artifacts/ -type f -exec mv {} release-assets/ \;
          ls -la release-assets/

      - name: Mark unix binaries executable
        run: chmod +x release-assets/relay-linux-* release-assets/relay-macos-*

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: ${{ steps.version.outputs.tag }}
          generate_release_notes: true
          draft: false
          prerelease: false
          files: release-assets/*
