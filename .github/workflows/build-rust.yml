name: Build & Push Relay

on:
  push:
    branches:
      - main
      - prod
    paths:
      - "crates/relay/**"
      - "crates/common/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - ".github/workflows/build-rust.yml"

permissions:
  contents: read
  packages: write

jobs:
  build-binary:
    name: Build relay binary
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-musl

      - name: Install cross
        uses: taiki-e/install-action@v2
        with:
          tool: cross

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          key: x86_64-unknown-linux-musl

      - name: Build
        run: cross build --release --target x86_64-unknown-linux-musl --bin relay

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: relay-binary
          path: target/x86_64-unknown-linux-musl/release/relay
          if-no-files-found: error
          retention-days: 1

  build-image:
    name: Build & push Docker image
    needs: build-binary
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download relay binary
        uses: actions/download-artifact@v4
        with:
          name: relay-binary
          path: crates/relay/

      - name: Mark binary executable
        run: chmod +x crates/relay/relay

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}-relay
          tags: |
            type=raw,value=main,enable=${{ github.ref == 'refs/heads/main' }}
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/prod' }}
            type=raw,value=${{ github.sha }},enable=${{ github.ref == 'refs/heads/prod' }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: crates/relay
          file: crates/relay/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
